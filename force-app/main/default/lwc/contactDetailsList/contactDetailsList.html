<template>
    <lightning-card title="Contact Search">
        <div class="slds-m-around_medium">
            <lightning-input type="search" label="Search" placeholder="Enter contact name"
             onchange={handleSearch}></lightning-input>
        </div>
        <div class="slds-m-around_medium">
            <lightning-datatable
                key-field="Id"
                data={contacts}
                columns={columns}>
            </lightning-datatable>
        </div>
    </lightning-card>
</template>
